# .github/workflows/deploy.yml
name: Deploy to Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            SSH_KEY_PATH="/home/${{ secrets.SERVER_USER }}/.ssh/config"
            REPO_URL="git@github.com:${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"
            APP_DIR="/home/${{ secrets.SERVER_USER }}/app/crawler-service"
            echo "配置 GitHub SSH 密钥..."
            # 配置 Git 使用指定的 SSH 密钥（临时方式）
            export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key_$$"
            cat $SSH_KEY_PATH
            rm -rf $SSH_KEY_PATH
            # 将私钥写入临时文件
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key_$$
            chmod 600 /tmp/deploy_key_$$
            echo "开始部署 - 分支: $BRANCH $APP_DIR"
            
            mkdir -p $APP_DIR
             
            echo "mkdir  $APP_DIR"
            cd $APP_DIR
            echo "cd  $APP_DIR"

            echo "克隆仓库..."
            rm -rf $APP_DIR/*
            git clone $REPO_URL .
            git checkout $BRANCH
            
            CURRENT_COMMIT=$(git rev-parse --short HEAD)
            echo "当前版本: $CURRENT_COMMIT"
            
            echo "构建 Docker 镜像..."
            docker build -t crawler-service:latest -t crawler-service:$CURRENT_COMMIT .
            
            echo "重启容器..."
            docker compose down || true
            docker compose up -d
            
            echo "清理资源..."
            docker image prune -f
            docker system prune -f --filter "until=24h"
            rm -f /tmp/deploy_key_$$

            echo "部署完成"
