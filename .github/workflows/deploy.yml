name: Deploy to Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            
            # 设置仓库信息
            REPO_URL="git@github.com:${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"
            APP_DIR="/home/${{ secrets.SERVER_USER }}/app/crawler-service"
            
            echo "开始部署 - 分支: $BRANCH"
            echo "应用目录: $APP_DIR"
            
            # 创建应用目录
            mkdir -p $APP_DIR
            
            # 进入目录
            cd $APP_DIR
            
            # 克隆或更新仓库
            if [ -d ".git" ]; then
                echo "更新现有仓库..."
                git fetch --all
                git reset --hard origin/$BRANCH
                git checkout $BRANCH
                git pull origin $BRANCH
            else
                echo "克隆新仓库..."
                rm -rf $APP_DIR/*
                git clone $REPO_URL .
                git checkout $BRANCH
            fi
            
            CURRENT_COMMIT=$(git rev-parse --short HEAD)
            echo "当前版本: $CURRENT_COMMIT"
            
            # 构建和部署
            echo "构建 Docker 镜像..."
            docker build -t crawler-service:latest -t crawler-service:$CURRENT_COMMIT .
            
            echo "重启容器..."
            docker compose down || true
            docker compose up -d
            
            echo "清理资源..."
            docker image prune -f
            docker system prune -f --filter "until=24h"
            
            echo "部署完成"
