# .github/workflows/deploy.yml
name: Deploy to Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            SSH_KEY_PATH="/home/${{ secrets.SERVER_USER }}/.ssh/github_key"
            REPO_URL="git@github.com:${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"
            APP_DIR="/home/${{ secrets.SERVER_USER }}/app/crawler-service"
            echo "配置 GitHub SSH 密钥..."
            mkdir -p /home/${{ secrets.SERVER_USER }}/.ssh
            # 从 secrets 中读取 GitHub SSH 私钥
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > $SSH_KEY_PATH
            chmod 600 $SSH_KEY_PATH
            
            # 配置 SSH config
            cat >> /home/${{ secrets.SERVER_USER }}/.ssh/config << EOF
            Host github.com
              HostName github.com
              User git
              IdentityFile $SSH_KEY_PATH
              StrictHostKeyChecking no
            EOF
            chmod 600 /home/${{ secrets.SERVER_USER }}/.ssh/config
            echo "开始部署 - 分支: $BRANCH $APP_DIR"
            
            mkdir -p $APP_DIR
             
            echo "mkdir  $APP_DIR"
            cd $APP_DIR
            echo "cd  $APP_DIR"

            echo "克隆仓库..."
            rm -rf $APP_DIR/*
            git clone $REPO_URL .
            git checkout $BRANCH
            
            CURRENT_COMMIT=$(git rev-parse --short HEAD)
            echo "当前版本: $CURRENT_COMMIT"
            
            echo "构建 Docker 镜像..."
            docker build -t crawler-service:latest -t crawler-service:$CURRENT_COMMIT .
            
            echo "重启容器..."
            docker compose down || true
            docker compose up -d
            
            echo "清理资源..."
            docker image prune -f
            docker system prune -f --filter "until=24h"
            
            echo "部署完成"
